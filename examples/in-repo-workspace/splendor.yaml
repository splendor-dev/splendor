  raw_sources_dir: raw/sources
  raw_assets_dir: raw/assets
  raw_imports_dir: raw/imports
  derived_dir: derived
  derived_ocr_dir: derived/ocr
  derived_parsed_dir: derived/parsed
  derived_metadata_dir: derived/metadata
