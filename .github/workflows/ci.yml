name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v5
      - name: Sync dependencies
        run: uv sync --dev
      - name: Check formatting
        run: uv run ruff format --check .
      - name: Lint
        run: uv run ruff check .

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v5
      - name: Sync dependencies
        run: uv sync --dev
      - name: Run tests with coverage
        run: uv run pytest --cov=splendor --cov-report=term-missing --cov-report=xml
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: error
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          fail_ci_if_error: true
          use_oidc: true

  pr-agent-context:
    name: PR agent context
    if: ${{ always() && github.event_name == 'pull_request' && needs.test.result == 'success' }}
    needs: [lint, test]
    permissions:
      contents: read
      actions: read
      pull-requests: write
    uses: shaypal5/pr-agent-context/.github/workflows/pr-agent-context.yml@v4.0.16
    with:
      tool_ref: v4.0.16
      include_patch_coverage: true
      patch_coverage_source_mode: coverage_xml_artifact
      coverage_report_artifact_name: coverage-xml
      coverage_report_filename: coverage.xml
      target_patch_coverage: "70"
      prompt_template_file: .github/pr-agent-context-template.md
      debug_artifacts: true
