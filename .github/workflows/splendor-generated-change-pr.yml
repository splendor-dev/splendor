name: Splendor generated-change PR

on:
  workflow_dispatch:
  schedule:
    - cron: "23 4 * * 1"

permissions:
  contents: write
  pull-requests: write

jobs:
  repo-refresh-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v5
      - name: Sync dependencies
        run: uv sync --dev
      - name: Refresh generated Splendor wiki state
        run: uv run splendor repo refresh
      - name: Run Splendor lint
        run: uv run splendor lint
      - name: Upload Splendor lint reports
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: splendor-generated-change-lint-reports
          path: reports/lint/**
          if-no-files-found: warn
      - name: Open or update generated-change PR
        uses: peter-evans/create-pull-request@v8
        with:
          branch: codex/splendor-generated-repo-refresh
          base: main
          commit-message: M8-P2.1 refresh Splendor generated wiki state
          title: M8-P2.1 Refresh Splendor generated wiki state
          body: |
            This PR was generated by the optional Splendor generated-change workflow.

            It runs `splendor repo refresh` from `main` and proposes deterministic updates to the
            generated wiki/source-registry state for human review.

            Review expectations:
            - Confirm the generated wiki and source-registry diffs match the repository changes.
            - Confirm Splendor lint passed in the generating workflow.
            - Dispatch or rerun normal CI manually if required by repository policy.

            Note: this workflow uses `GITHUB_TOKEN`. GitHub documents that most events triggered by
            `GITHUB_TOKEN`, including commits or pull requests created by a workflow, do not create
            follow-up workflow runs automatically.
          add-paths: |
            wiki/**
            state/manifests/sources/**
            raw/sources/**
